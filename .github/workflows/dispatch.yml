name: Funkin Dispatch

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

concurrency:
  group: funkin-dispatch-state
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Check featured mods
        run: python src/run.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Save position state
        run: |
          git config user.name "Funkin Dispatch"
          git config user.email "funkin-dispatch@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update dispatch state"
          git push
